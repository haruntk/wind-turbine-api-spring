# =============================================================================
# Common / production-safe defaults.
# Override locally via application-dev.yml (SPRING_PROFILES_ACTIVE=dev) or
# environment variables in production.
# =============================================================================

spring:
  application:
    name: wind-turbine-api

  # ---------------------------------------------------------------------------
  # PostgreSQL / TimescaleDB. URL + credentials come from env vars in prod.
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/wind_turbine_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000

  jpa:
    hibernate:
      # 'validate' fails fast if entity ↔ DB schema drifts.
      # NEVER use create / create-drop / update against a real database.
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false      # disables OSIV anti-pattern

  flyway:
    # Schema is owned by external SQL migrations for now.
    # Switch on once baseline migrations are added under db/migration.
    enabled: false

# =============================================================================
# JWT — bound to com.windturbine...security.JwtProperties
# Secret MUST be at least 32 chars (HMAC-SHA256). Override in production.
# =============================================================================
jwt:
  secret-key: ${JWT_SECRET_KEY:}
  issuer: ${JWT_ISSUER:WindTurbineAPI}
  audience: ${JWT_AUDIENCE:WindTurbineDashboard}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}

# =============================================================================
# CORS — front-end origin allow-list.
# =============================================================================
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# =============================================================================
# Server
# =============================================================================
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

# =============================================================================
# Actuator — expose only health / info publicly (see SecurityConfig).
# =============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# =============================================================================
# Logging
# =============================================================================
logging:
  level:
    root: INFO
    com.windturbine: INFO
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
